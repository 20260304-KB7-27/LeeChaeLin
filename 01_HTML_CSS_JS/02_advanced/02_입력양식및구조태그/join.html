<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table tr > td:first-child {
        text-align: center;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>

        <table>
          <tr>
            <td><label for="id">사용자 ID</label></td>
            <td><input id="id" type="text" /></td>
          </tr>
          <tr>
            <td><label for="pw">비밀번호</label></td>
            <td><input id="pw" type="password" /></td>
          </tr>
          <tr>
            <td><label for="pwcheck">비밀번호 확인</label></td>
            <td><input id="pwcheck" type="password" /></td>
          </tr>
          <tr>
            <td><label for="name">이름</label></td>
            <td><input id="name" type="text" /></td>
          </tr>
          <tr>
            <td>성별</td>
            <td>
              <input type="radio" id="man" name="gender" /><label for="man"
                >남</label
              >
              <input type="radio" id="woman" name="gender" /><label for="woman"
                >여</label
              >
            </td>
          </tr>
          <tr>
            <td>취미</td>
            <td>
              <input type="checkbox" id="soc" /><label for="soc">축구</label>
              <input type="checkbox" id="base" /><label for="base">야구</label>
              <input type="checkbox" id="volley" /><label for="volley"
                >배구</label
              >
              <input type="checkbox" id="basket" /><label for="basket">농구</label>
            </td>
          </tr>
          <tr>
            <td><label for="mail">email</label></td>
            <td><input type="email" id="mail" /></td>
          </tr>
          <tr>
            <td>역할</td>
            <td>
              <select>
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
