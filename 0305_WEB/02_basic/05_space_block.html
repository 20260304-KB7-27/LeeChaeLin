    <!--
  block
  - 줄바꿈이 일어남
  - 너비와 높이 설정이 가능
  - 기본적으로 부모 요소의 전체 너비를 차지
  - 여백, 패딩 (margin, padding) 설정 가능

  주요 블록 태그
  <div>
  <p>: 문단
  <ul>, <ol>: 목록
  <form>
  시맨틱 태그: <header>, <footer>...
  -->
    <div>첫 번째 div는 새로운 줄에서 시작됨</div>
    <div style="background-color: green">두 번째 div는 자동으로 줄바꿈이됨</div>
    <div style="width: 200px; height: 50px; background-color: orange">
      너비와 높이가 지정된 div
    </div>
