<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록 v3 - 수정 기능 포함</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .wrap {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        border-bottom: 1px solid #eee;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content,
      .updateBox {
        margin-top: 10px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      .updateWrap {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 5px;
      }
      .updateWrap input,
      .updateWrap textarea {
        padding: 10px;
      }
      button {
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
        margin-right: 2px;
      }
      button:hover {
        background: #ff4f4f;
      }
      .inputBox {
        display: flex;
        justify-content: center;
        gap: 5px;
        margin-bottom: 20px;
      }
      input {
        padding: 5px 10px;
      }
      .arrow {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v3</h1>

      <div class="inputBox">
        <input type="text" placeholder="새 제목" v-model.trim="title" />
        <input type="text" placeholder="새 내용" v-model.trim="content" />
        <button @click="addContent">작성</button>
      </div>

      <ul>
        <li
          v-for="post in sortedPosts"
          :key="post.no"
          class="post-item"
          @click="open(post.no)"
        >
          <div class="wrap">
            <h2>{{ post.no }}. {{ post.title }}</h2>
            <span class="arrow">{{ selectNo === post.no ? '▲' : '▼' }}</span>
          </div>

          <div
            v-if="selectNo === post.no && editNo !== post.no"
            class="post-content"
            @click.stop
          >
            <p>{{ post.content }}</p>
            <button @click="startEdit(post)">수정</button>
            <button @click="deleteContent(post.no)">삭제</button>
            <button class="btn-cancel" @click="selectNo = null">닫기</button>
          </div>

          <div v-if="editNo === post.no" class="updateBox" @click.stop>
            <div class="updateWrap">
              <input type="text" v-model="editTitle" />
              <textarea v-model="editContent" rows="3"></textarea>
            </div>
            <button class="btn-save" @click="saveEdit">저장</button>
            <button class="btn-cancel" @click="editNo = null">취소</button>
          </div>
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const posts = ref([
            {
              no: 1,
              title: 'Vue.js 기초 배우기',
              content:
                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
            },
            {
              no: 2,
              title: '자바스크립트 ES6 문법',
              content:
                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
            },
            {
              no: 3,
              title: 'Node.js와 Express',
              content:
                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
            },
            {
              no: 4,
              title: 'MongoDB 기본 개념',
              content:
                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
            },
            {
              no: 5,
              title: '프론트엔드와 백엔드의 차이',
              content:
                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
            },
            {
              no: 6,
              title: '비동기 프로그래밍',
              content:
                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
            },
            {
              no: 7,
              title: 'Vue Router 사용법',
              content:
                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
            },
            {
              no: 8,
              title: '컴포넌트 기반 개발',
              content:
                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
            },
            {
              no: 9,
              title: 'CSS와 SCSS 차이점',
              content:
                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
            },
            {
              no: 10,
              title: 'Git과 GitHub 사용법',
              content:
                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
            },
          ]);

          const selectNo = ref(null);
          const title = ref('');
          const content = ref('');
          const no = ref(11);

          const editNo = ref(null);
          const editTitle = ref('');
          const editContent = ref('');

          function open(postNo) {
            if (editNo.value) return;
            selectNo.value = selectNo.value === postNo ? null : postNo;
          }

          const sortedPosts = computed(() => {
            return [...posts.value].sort((a, b) => b.no - a.no);
          });

          const addContent = () => {
            if (!title.value || !content.value) return;
            posts.value.unshift({
              no: no.value++,
              title: title.value,
              content: content.value,
            });
            title.value = '';
            content.value = '';
          };

          const deleteContent = (postNo) => {
            if (!confirm('삭제하시겠습니까?')) return;
            posts.value = posts.value.filter((p) => p.no !== postNo);
          };

          const startEdit = (post) => {
            editNo.value = post.no;
            editTitle.value = post.title;
            editContent.value = post.content;
          };

          const saveEdit = () => {
            const target = posts.value.find((p) => p.no === editNo.value);
            if (target) {
              target.title = editTitle.value;
              target.content = editContent.value;
            }
            editNo.value = null;
          };

          return {
            posts,
            open,
            selectNo,
            title,
            content,
            addContent,
            deleteContent,
            editNo,
            editTitle,
            editContent,
            startEdit,
            saveEdit,
            sortedPosts,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
