<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- input 이벤트 핸들러를 통해 바로 반영  -->
      <!-- 
      v-model
      - 폼 입력 요소와 Vue의 데이터를 양방향으로 바인딩해주는 디렉티브
      
      v-model 수식어

      1. .lazy: change이벤트가 발생시에만 데이터를 업데이트
      
      2. .number: 사용자의 입력을 숫자로 형변환(형변환 불가시, 원래값을 유지)

      3. .trim: 입력값의 앞뒤 공백을 자동으로 제거
       -->
      <input type="text" v-model.trim="name" />
      <br />
      <div>입력한 값: {{name}}</div>
    </div>

    <script>
      const { createApp, ref } = Vue;
      // 반응형 데이터
      createApp({
        setup() {
          const name = ref('');
          const changeName = (e) => {
            name.value = e.target.value;
          };
          return { name, changeName };
        },
      }).mount('#app');
    </script>
  </body>
</html>
