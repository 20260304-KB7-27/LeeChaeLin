<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input type="text" :valu="name" @input="(e)=>this.name=e.target.value" />
      <br />
      이름: <span>{{name}}</span>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            name: '',
          };
        },
        methods: {},
      }).mount('#app');
    </script>
  </body>
</html>
