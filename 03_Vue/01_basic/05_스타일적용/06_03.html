<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div @mouseover="parentOverEvent" @mouseout="parentOutEvent">
        <button
          @mouseover.stop="overEvent"
          @mouseout="outEvent"
          :style="{backgroundColor, color}"
        >
          테스트
        </button>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const backgroundColor = ref('aqua');
          const color = ref('black');
          const overEvent = () => {
            // 스타일 변경
            backgroundColor.value = 'purple';
            color.value = 'yellow';
          };
          const outEvent = (e) => {
            // 스타일 변경
            backgroundColor.value = 'aqua';
            color.value = 'black';
            e.stopPropagation(); // 이벤트 전파 막기
          };

          const parentOverEvent = () => {
            console.log('paranet Over Event');
          };

          const parentOutEvent = () => {
            console.log('parent Out Event');
          };
          return {
            backgroundColor,
            color,
            overEvent,
            outEvent,
            parentOverEvent,
            parentOutEvent,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
